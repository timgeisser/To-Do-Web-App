<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>To-Do App</h1>

  <form id="task-form">
    <input type="text" id="task-input" placeholder="Aufgabe eingeben" required>
    <input type="text" id="assignee-input" placeholder="Zugewiesen an">
    <button type="submit">Hinzufügen</button>
  </form>

  <ul id="task-list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
